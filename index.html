<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <!-- Uncomment before deploying: <base href="https://cvine001xamk.github.io/traininglog/" /> -->
    <title>Training Log</title>
    <link rel="stylesheet" href="./style.css?v=10" />
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#3399ff" />
    <style>
      @font-face {
        font-family: "Bokor";
        src: url("./static/fonts/Bokor-Regular.ttf") format("truetype");
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Training Log</h1>
      </header>

      <main>
        <section id="log-workout">
          <div
            style="
              display: flex;
              justify-content: flex-end;
              margin-bottom: 0.5rem;
            "
          >
            <button
              id="timer-badge"
              class="badge-timer"
              type="button"
              aria-label="Add 1 minute timer"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                style="margin-right: 4px; vertical-align: text-bottom"
              >
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
              </svg>
              <span id="timer-display">00:00</span>
            </button>
          </div>
          <form id="add-exercise-form">
            <div class="form-group">
              <label for="exercise">Exercise</label>
              <select id="exercise" required>
                <!-- Exercise options will be populated by JS -->
              </select>
            </div>
            <div class="grid">
              <div
                class="form-group"
                style="
                  display: flex;
                  flex-direction: column;
                  justify-content: flex-end;
                "
              >
                <label
                  for="weight"
                  style="
                    display: flex;
                    justify-content: space-between;
                    align-items: flex-end;
                    margin-bottom: 0.25rem;
                  "
                >
                  <span>Weight (kg)</span>
                </label>
                <small id="last-weight-info"></small>
                <input
                  type="number"
                  id="weight"
                  min="0"
                  step="any"
                  inputmode="decimal"
                  autocomplete="off"
                  placeholder="e.g., 100"
                  required
                  style="margin-top: auto"
                />
              </div>
              <div
                class="form-group"
                style="display: flex; flex-direction: column; height: 100%"
              >
                <div
                  id="plate-visualizer"
                  style="
                    display: none;
                    align-items: center;
                    justify-content: flex-start;
                    flex: 1;
                    width: 100%;
                    max-height: 74px;
                    margin-top: auto;
                    border-radius: 4px;
                    background: transparent;
                    overflow: hidden;
                    position: relative;
                  "
                >
                  <!-- Barbell sleeve -->
                  <div
                    style="
                      position: absolute;
                      left: 0;
                      right: 0;
                      height: 8px;
                      background: #666;
                      border-radius: 2px;
                      top: 50%;
                      transform: translateY(-50%);
                    "
                  ></div>
                  <!-- Collar -->
                  <div
                    style="
                      position: absolute;
                      left: 4px;
                      height: 16px;
                      width: 6px;
                      background: #444;
                      border-radius: 2px;
                      top: 50%;
                      transform: translateY(-50%);
                      z-index: 10;
                    "
                  ></div>
                  <div
                    id="plates-container"
                    style="
                      display: flex;
                      gap: 1px;
                      align-items: center;
                      margin-left: 12px;
                      position: relative;
                      z-index: 20;
                      height: 100%;
                      padding: 4px 0;
                    "
                  ></div>
                </div>
              </div>
              <div class="form-group">
                <label for="sets">Sets</label>
                <input
                  type="number"
                  id="sets"
                  min="0"
                  inputmode="numeric"
                  autocomplete="off"
                  placeholder="e.g., 3"
                  required
                />
              </div>
              <div class="form-group">
                <label for="reps">Reps</label>
                <input
                  type="number"
                  id="reps"
                  min="0"
                  inputmode="numeric"
                  autocomplete="off"
                  placeholder="e.g., 5"
                  required
                />
              </div>
            </div>
            <button type="submit">Add Exercise</button>
          </form>

          <div id="current-workout-section" class="hidden">
            <h2>Current Workout</h2>
            <div id="current-workout-list">
              <!-- Current exercises will be dynamically inserted here -->
            </div>
            <button id="save-workout-btn" disabled>Save Workout</button>
          </div>
        </section>

        <section id="history" hidden>
          <div class="section-header">
            <h2>Workout History</h2>
            <div>
              <button
                id="import-csv-btn"
                class="icon-btn"
                aria-label="Import CSV"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                  <polyline points="17 8 12 3 7 8" />
                  <line x1="12" y1="3" x2="12" y2="15" />
                </svg>
              </button>
              <button
                id="export-csv-btn"
                class="icon-btn"
                aria-label="Export CSV"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                  <polyline points="7 10 12 15 17 10" />
                  <line x1="12" y1="15" x2="12" y2="3" />
                </svg>
              </button>
              <button
                id="clear-history-btn"
                class="icon-btn delete-btn"
                aria-label="Clear History"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <polyline points="3 6 5 6 21 6"></polyline>
                  <path
                    d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
                  ></path>
                  <line x1="10" y1="11" x2="10" y2="17"></line>
                  <line x1="14" y1="11" x2="14" y2="17"></line>
                </svg>
              </button>
            </div>
          </div>
          <div id="history-list">
            <!-- Workouts will be dynamically inserted here -->
          </div>
          <input type="file" id="csv-file-input" accept=".csv" hidden />
        </section>

        <section id="exercises" hidden>
          <details style="margin-bottom: 1rem" class="custom-details">
            <summary><h2>Manage Plates</h2></summary>
            <div id="plate-list" style="margin-top: 1rem">
              <!-- Plate list will be populated by JS -->
            </div>
            <form id="add-new-plate-form">
              <div class="grid">
                <div class="form-group">
                  <label for="new-plate-weight">Plate Weight (kg)</label>
                  <input
                    type="number"
                    id="new-plate-weight"
                    min="0"
                    step="any"
                    inputmode="decimal"
                    placeholder="e.g., 20"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="new-plate-amount">Amount</label>
                  <input
                    type="number"
                    id="new-plate-amount"
                    min="1"
                    step="1"
                    inputmode="numeric"
                    placeholder="e.g., 2"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="new-plate-color">Color</label>
                  <input
                    type="color"
                    id="new-plate-color"
                    value="#cfcfcf"
                    style="
                      padding: 0.1rem;
                      min-height: 44px;
                      width: 100%;
                      cursor: pointer;
                    "
                  />
                </div>
              </div>
              <button type="submit">Add Plates</button>
            </form>
          </details>

          <details class="custom-details" open>
            <summary><h2>Manage Exercises</h2></summary>
            <div id="exercise-list" style="margin-top: 1rem">
              <!-- Exercise list will be populated by JS -->
            </div>
            <form id="add-new-exercise-form">
              <div class="form-group">
                <label for="new-exercise-name">Add New Exercise</label>
                <input
                  type="text"
                  id="new-exercise-name"
                  placeholder="e.g., Bicep Curls"
                  required
                />
              </div>
              <div class="form-group">
                <label for="new-exercise-bar-weight">Default Bar Weight</label>
                <select id="new-exercise-bar-weight">
                  <option value="2">2 kg</option>
                  <option value="8">8 kg</option>
                  <option value="10" selected>10 kg</option>
                  <option value="20">20 kg</option>
                </select>
              </div>
              <button type="submit">Add Exercise Type</button>
            </form>
          </details>
        </section>

        <section id="chart-view" hidden>
          <div class="chart-header">
            <button id="back-to-exercises-btn" class="icon-btn" aria-label="Back to exercises">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>
            <h2 id="chart-title"></h2>
            <button id="chart-goal-toggle" class="icon-btn" aria-label="Set goal weight">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>
            </button>
          </div>
          <div id="chart-goal-row" class="chart-goal-row hidden">
            <label for="goal-weight-input">Goal (kg):</label>
            <input
              type="number"
              id="goal-weight-input"
              min="0"
              step="any"
              inputmode="decimal"
              autocomplete="off"
            />
            <button id="save-goal-btn" class="secondary">Save</button>
          </div>
          <div class="chart-range-bar">
            <div class="chart-range-buttons">
              <button class="range-btn" data-range="1M">1M</button>
              <button class="range-btn" data-range="3M">3M</button>
              <button class="range-btn" data-range="6M">6M</button>
              <button class="range-btn" data-range="1Y">1Y</button>
              <button class="range-btn active" data-range="ALL">All</button>
            </div>
            <button id="reset-zoom-btn" class="icon-btn" aria-label="Reset zoom">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
            </button>
          </div>
          <div class="chart-canvas-wrapper">
            <canvas id="exercise-chart"></canvas>
          </div>
        </section>
      </main>
    </div>

    <nav id="bottom-nav">
      <button id="log-view-btn" class="active">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="18" x2="12" y2="12"></line><line x1="9" y1="15" x2="15" y2="15"></line></svg>
        <span>Log</span>
        <span id="workout-badge" class="nav-badge hidden"></span>
      </button>
      <button id="history-view-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        <span>History</span>
      </button>
      <button id="exercises-view-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
        <span>Exercises</span>
      </button>
    </nav>

    <dialog id="app-dialog">
      <div class="dialog-content">
        <p id="dialog-message"></p>
        <div class="dialog-actions">
          <button id="dialog-cancel-btn" class="secondary">Cancel</button>
          <button id="dialog-confirm-btn">OK</button>
        </div>
      </div>
    </dialog>

    <script src="./dexie.min.js"></script>
    <!-- Chart.js is now lazy loaded -->
    <!-- <script src="./chart.min.js"></script> -->
    <script type="module" src="./app.js"></script>
  </body>
</html>
